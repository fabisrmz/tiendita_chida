<div class="min-h-screen flex items-center justify-center bg-linear-to-r from-blue-500 to-purple-600 p-4">

  <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl p-8">

    <div class="text-center mb-8">

      <h1 class="text-4xl font-bold text-gray-800 mb-2">
        Bienvenido
      </h1>

      <p class="text-gray-500">
        Inicia sesión en tu cuenta
      </p>

    </div>

    <form class="flex flex-col gap-5">

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          Correo electrónico
        </label>

        <input
          type="email"
          placeholder="correo@gmail.com"
          class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          Contraseña
        </label>

        <input
          type="password"
          placeholder="********"
          class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <button
        class="bg-linear-to-r from-blue-500 to-purple-600 text-white py-3 rounded-xl font-semibold hover:opacity-90 transition"
      >
        Iniciar Sesión
      </button>

    </form>

    <p class="text-center text-gray-500 mt-6">
      ¿No tienes cuenta?
      <span class="text-blue-600 font-semibold cursor-pointer">
        Regístrate
      </span>
    </p>

  </div>

</div>
