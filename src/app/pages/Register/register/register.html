<div class="min-h-screen flex items-center justify-center bg-linear-to-r from-pink-500 to-orange-400 p-4">

  <div class="bg-white w-full max-w-lg rounded-3xl shadow-2xl p-8">

    <div class="text-center mb-8">

      <h1 class="text-4xl font-bold text-gray-800 mb-2">
        Crear Cuenta
      </h1>

      <p class="text-gray-500">
        Regístrate para continuar
      </p>

    </div>

    <form class="flex flex-col gap-5">

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          Nombre completo
        </label>

        <input
          type="text"
          placeholder="Tu nombre"
          class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-pink-500"
        />
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          Correo electrónico
        </label>

        <input
          type="email"
          placeholder="correo@gmail.com"
          class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-pink-500"
        />
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          Contraseña
        </label>

        <input
          type="password"
          placeholder="********"
          class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-pink-500"
        />
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          Confirmar contraseña
        </label>

        <input
          type="password"
          placeholder="********"
          class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-pink-500"
        />
      </div>

      <button
        class="bg-linear-to-r from-pink-500 to-orange-400 text-white py-3 rounded-xl font-semibold hover:opacity-90 transition"
      >
        Registrarse
      </button>

    </form>

    <p class="text-center text-gray-500 mt-6">
      ¿Ya tienes cuenta?
      <span class="text-pink-600 font-semibold cursor-pointer">
        Inicia sesión
      </span>
    </p>

  </div>

</div>
