<div class="min-h-screen flex items-center justify-center bg-gray-100">

  <div class="bg-white w-[380px] p-8 rounded-2xl shadow-xl">

    <div class="mb-6 text-center">

      <h1 class="text-3xl font-bold text-gray-800">
        Registro
      </h1>

      <p class="text-gray-500 mt-2">
        Crea tu cuenta
      </p>

    </div>

    <form class="flex flex-col gap-4">

      <div>
        <label class="block mb-2 text-sm text-gray-600">
          Correo electrónico
        </label>

        <input
          type="email"
          placeholder="correo@gmail.com"
          class="w-full border border-gray-300 p-3 rounded-lg outline-none focus:border-blue-500"
        />
      </div>

      <div>
        <label class="block mb-2 text-sm text-gray-600">
          Contraseña
        </label>

        <input
          type="password"
          placeholder="********"
          class="w-full border border-gray-300 p-3 rounded-lg outline-none focus:border-blue-500"
        />
      </div>

      <button
        class="bg-blue-500 hover:bg-blue-600 transition text-white py-3 rounded-lg font-semibold mt-2"
      >
        Registrarse
      </button>

    </form>

    <p class="text-center text-gray-500 text-sm mt-6">
      ¿Ya tienes cuenta?
      <span class="text-blue-500 cursor-pointer">
        Inicia sesión
      </span>
    </p>

  </div>

</div>
