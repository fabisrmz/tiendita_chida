<div class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">

  <!-- Modal -->
  <div class="bg-white w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden animate-fadeIn">

    <!-- Header -->
    <div class="bg-linear-to-r from-pink-500 to-purple-600 p-6 text-white flex justify-between items-center">

      <div>
        <h2 class="text-3xl font-bold">
          Nuevo Producto
        </h2>

        <p class="text-sm opacity-80">
          Agrega un producto a tu tienda
        </p>
      </div>

      <button
        (click)="closeModal()"
        class="bg-white/20 hover:bg-white/30 transition w-10 h-10 rounded-full text-xl font-bold"
      >
        ✕
      </button>

    </div>

    <!-- Body -->
    <form class="p-6 flex flex-col gap-5">

      <!-- Nombre -->
      <div>
        <label class="block mb-2 text-sm font-semibold text-gray-700">
          Nombre del producto
        </label>

        <input
          type="text"
          placeholder="Ej. Sudadera Oversize"
          class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-pink-500"
        />
      </div>

      <!-- Precio y stock -->
      <div class="grid grid-cols-2 gap-4">

        <div>
          <label class="block mb-2 text-sm font-semibold text-gray-700">
            Precio
          </label>

          <input
            type="number"
            placeholder="$0.00"
            class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-pink-500"
          />
        </div>

        <div>
          <label class="block mb-2 text-sm font-semibold text-gray-700">
            Stock
          </label>

          <input
            type="number"
            placeholder="0"
            class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-pink-500"
          />
        </div>

      </div>

      <!-- Categoría -->
      <div>
        <label class="block mb-2 text-sm font-semibold text-gray-700">
          Categoría
        </label>

        <select
          class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-pink-500"
        >
          <option>Ropa</option>
          <option>Calzado</option>
          <option>Accesorios</option>
          <option>Playeras</option>
          <option>Pantalones</option>
        </select>
      </div>

      <!-- Imagen -->
      <div>
        <label class="block mb-2 text-sm font-semibold text-gray-700">
          Imagen del producto
        </label>

        <input
          type="file"
          class="w-full border border-dashed border-gray-300 rounded-xl p-3 bg-gray-50"
        />
      </div>

      <!-- Descripción -->
      <div>
        <label class="block mb-2 text-sm font-semibold text-gray-700">
          Descripción
        </label>

        <textarea
          rows="4"
          placeholder="Describe el producto..."
          class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-pink-500"
        ></textarea>
      </div>

      <!-- Botones -->
      <div class="flex gap-4 pt-2">

        <button
          type="submit"
          class="flex-1 bg-linear-to-r from-pink-500 to-purple-600 hover:opacity-90 text-white py-3 rounded-xl font-semibold transition"
        >
          Guardar Producto
        </button>

        <button
          type="button"
          (click)="closeModal()"
          class="flex-1 border border-gray-300 hover:bg-gray-100 py-3 rounded-xl font-semibold transition"
        >
          Cancelar
        </button>

      </div>

    </form>

  </div>

</div>
